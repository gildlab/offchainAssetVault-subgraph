specVersion: 0.0.4
schema:
  file: ./schema.graphql 
dataSources:
  - kind: ethereum/contract #as is
    name: CloneFactory
    network: polygon-amoy
    source:
      address: "0x8F61d274aaB5D8CFD82dc266529EAe33020386a9"
      abi: CloneFactory
      startBlock: 20220545
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: CloneFactory
          file: ./abis/CloneFactory.json
      eventHandlers:
        - event: NewClone(address,address,address)
          handler: handleNewClone
      file: ./src/CloneFactory.ts
templates:
  - kind: ethereum/contract
    name: OffchainAssetReceiptVaultTemplate
    network: polygon-amoy
    source:
      abi: OffchainAssetReceiptVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: OffchainAssetReceiptVault
          file: ./abis/OffchainAssetReceiptVault.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,uint256) # Nothing to change
          handler: handleApproval
        - event: Certify(address,uint256,bool,bytes) # Changed this --done
          handler: handleCertify
        - event: ConfiscateReceipt(address,address,uint256,uint256,uint256,bytes) # Changed this --done
          handler: handleConfiscateReceipt
        - event: ConfiscateShares(address,address,uint256,uint256,bytes) # Changed this --done
          handler: handleConfiscateShares
        - event: Deposit(address,address,uint256,uint256,uint256,bytes)
          handler: handleDeposit
        - event: OffchainAssetReceiptVaultInitializedV2(address,(address,(address,(address,string,string)))) #dont change
          handler: handleOffchainAssetVaultInitializedV2
        # - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32) #dont change but check the implementation switch case
        #   handler: handleRoleAdminChanged
        - event: ReceiptVaultInformation(address,bytes) #dont change
          handler: handleReceiptVaultInformation 
        # - event: RoleGranted(indexed bytes32,indexed address,indexed address) #dont change but check the implementation
        #   handler: handleRoleGranted
        # - event: RoleRevoked(indexed bytes32,indexed address,indexed address) #dont change but check the implementation
        #   handler: handleRoleRevoked
        # - event: SetERC1155Tier(address,address,uint256,uint256[],bytes) #dont change
        #   handler: handleSetERC1155Tier
        # - event: SetERC20Tier(address,address,uint256,uint256[],bytes) #dont change
        #   handler: handleSetERC20Tier
        # - event: Snapshot(uint256) #dont change
        #   handler: handleSnapshot 
        - event: Transfer(indexed address,indexed address,uint256) #dont change
          handler: handleTransfer
        - event: Withdraw(address,address,address,uint256,uint256,uint256,bytes) #dont change
          handler: handleWithdraw
      file: ./src/OffchainAssetReceiptVault.ts
  - kind: ethereum/contract
    name: ReceiptTemplate
    network: polygon-amoy
    source:
      abi: Receipt
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: Receipt
          file: ./abis/Receipt.json
      eventHandlers:
        - event: ReceiptInformation(address,uint256,bytes)
          handler: handleReceiptInformation
      file: ./src/Receipt.ts