specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: CloneFactory
    network: base
    source:
      abi: CloneFactory
      address: "0x5e9e22154D71f9Fd4b5FD1eE36852A4c9FcDcC9E"
      startBlock: 39975787
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: CloneFactory
          file: ./lib/rain.factory/out/CloneFactory.sol/CloneFactory.json
      eventHandlers:
        - event: NewClone(address,address,address)
          handler: handleNewClone
      file: ./src/CloneFactory.ts
  - kind: ethereum/contract
    name: OffchainAssetReceiptVaultBeaconSetDeployer
    network: base
    source:
      abi: OffchainAssetReceiptVaultBeaconSetDeployer
      address: "0x9f1C34CA9017286E47629C153f0C09727b89415b"
      startBlock: 41020032
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: OffchainAssetReceiptVaultBeaconSetDeployer
          file: ./lib/ethgild/out/OffchainAssetReceiptVaultBeaconSetDeployer.sol/OffchainAssetReceiptVaultBeaconSetDeployer.json
      eventHandlers:
        - event: Deployment(address,address,address)
          handler: handleDeployment
      file: ./src/OffchainAssetReceiptVaultBeaconSetDeployer.ts
templates:
  - kind: ethereum/contract
    name: OffchainAssetReceiptVaultTemplate
    network: base
    source:
      abi: OffchainAssetReceiptVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: OffchainAssetReceiptVault
          file: ./lib/ethgild/out/OffchainAssetReceiptVault.sol/OffchainAssetReceiptVault.json
      eventHandlers:
        - event: Certify(address,uint256,bool,bytes)
          handler: handleCertify
        - event: ConfiscateReceipt(address,address,uint256,uint256,uint256,bytes)
          handler: handleConfiscateReceipt
        - event: ConfiscateShares(address,address,uint256,uint256,bytes)
          handler: handleConfiscateShares
        - event: Deposit(address,address,uint256,uint256,uint256,bytes)
          handler: handleDeposit
        - event: OffchainAssetReceiptVaultInitializedV2(address,(address,(address,string,string,address)))
          handler: handleOffchainAssetVaultInitializedV2
        - event: AuthorizerSet(address,address)
          handler: handleAuthorizerSet
        - event: ReceiptVaultInformation(address,bytes)
          handler: handleReceiptVaultInformation
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Withdraw(address,address,address,uint256,uint256,uint256,bytes)
          handler: handleWithdraw
      file: ./src/OffchainAssetReceiptVault.ts
  - kind: ethereum/contract
    name: OffchainAssetReceiptVaultAuthorizerV1Template
    network: base
    source:
      abi: OffchainAssetReceiptVaultAuthorizerV1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Authorizer
        - Role
        - RoleHolder
      abis:
        - name: OffchainAssetReceiptVaultAuthorizerV1
          file: ./lib/ethgild/out/OffchainAssetReceiptVaultAuthorizerV1.sol/OffchainAssetReceiptVaultAuthorizerV1.json
      eventHandlers:
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
      file: ./src/OffchainAssetReceiptVaultAuthorizerV1.ts
  - kind: ethereum/contract
    name: ReceiptTemplate
    network: base
    source:
      abi: Receipt
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VerifyFactory
        - Verify
      abis:
        - name: Receipt
          file: ./lib/ethgild/out/Receipt.sol/Receipt.json
      eventHandlers:
        - event: ReceiptInformation(address,uint256,bytes)
          handler: handleReceiptInformation
      file: ./src/Receipt.ts
